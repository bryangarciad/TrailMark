name: Deploy course site to GitHub Pages

# Publishes the Docs/ folder (the four cross-linked course pages) to GitHub
# Pages. Enable it once: repo → Settings → Pages → Build and deployment →
# Source: "GitHub Actions". After that, every push to main republishes the site
# and the run summary prints the public URL.

on:
  push:
    branches: [main]
    paths:
      - 'Docs/**'
      - '.github/workflows/deploy-pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow only one concurrent deployment; don't cancel an in-progress run.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5
        # NOTE: Pages must be enabled ONCE by hand first:
        #   repo → Settings → Pages → Build and deployment → Source: "GitHub Actions"
        # The GITHUB_TOKEN can't create the Pages site itself in this repo
        # ("Resource not accessible by integration"), so auto-enablement is off.

      - name: Upload Docs/ as the site
        uses: actions/upload-pages-artifact@v3
        with:
          path: Docs

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
